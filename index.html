<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק הזיכרון - אומן ישראל 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>משחק הזיכרון של בניין אומן ישראל 2</h1>
            <p class="subtitle">מצאו את הזוגות כמה שיותר מהר!</p>
        </header>

        <div class="game-controls">
            <div class="stat-box">
                <span class="stat-label">זמן:</span>
                <span id="timer" class="stat-value">00:00</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">תנועות:</span>
                <span id="move-counter" class="stat-value">0</span>
            </div>
            <button id="restart-btn" class="primary-btn">התחלה מחדש</button>
        </div>

        <main class="game-grid" id="game-grid">
            <!-- Cards will be generated by JavaScript -->
        </main>

        <section class="leaderboard-section">
            <h2>טבלת שיאים</h2>
            <div class="table-container">
                <table id="leaderboard-table">
                    <thead>
                        <tr>
                            <th>דירוג</th>
                            <th>שם</th>
                            <th>זמן</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- Leaderboard data will be populated here -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Start Modal -->
    <div id="start-modal" class="modal show">
        <div class="modal-content">
            <div class="modal-header">
                <span class="confetti-icon">🏙️</span>
                <h2>ברוכים הבאים למשחק הזיכרון!</h2>
            </div>
            <p>רגע לפני שמתחילים, ספרו לנו מי אתם:</p>
            <div class="input-group">
                <label for="initial-name">שם מלא:</label>
                <input type="text" id="initial-name" placeholder="למשל: משפחת כהן" maxlength="20">
            </div>
            <div class="input-group">
                <label for="initial-apt">מספר דירה:</label>
                <input type="number" id="initial-apt" placeholder="למשל: 12" min="1" max="100">
            </div>
            <div class="modal-actions">
                <button id="start-game-btn" class="primary-btn">בואו נתחיל!</button>
            </div>
        </div>
    </div>

    <!-- Win Modal -->
    <div id="win-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="confetti-icon">🏆</span>
                <h2 id="win-title">כל הכבוד!</h2>
            </div>
            <p id="win-message"></p>
            <p id="funny-comment" class="funny-comment"></p>
            <div class="modal-actions">
                <button id="close-modal-btn" class="primary-btn">סגור וראה שיאים</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
